<style>
:root{
  --navy:#003877; --navy-dark:#002a5c; --gold:#c9982f;
  --primary:#0f172a; --secondary:#334155; --muted:#64748b;
  --bg-body:#f4f7fb; --bg-card:#ffffff; --border-light:#e2e8f0; --border-dark:#cbd5e1;
  --green:#16a34a; --green-bg:#f0fdf4;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.12), 0 4px 6px -4px rgba(0,0,0,.1);
}
[data-theme="dark"]{
  --navy:#5b9bd8; --primary:#f1f5f9; --secondary:#cbd5e1; --muted:#94a3b8;
  --bg-body:#0b1220; --bg-card:#151f2f; --border-light:#283249; --border-dark:#3a4666;
  --green-bg:#0c2417;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 6px -1px rgba(0,0,0,.5); --shadow-lg:0 10px 15px -3px rgba(0,0,0,.5);
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg-body); color:var(--secondary); font-family:'Inter',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; line-height:1.7; transition:background-color .25s ease;}
.wrap{max-width:980px; margin:0 auto; padding:0 1rem 4rem;}
.icon-btn{position:fixed; top:1rem; right:1rem; background:var(--bg-card); border:1px solid var(--border-light); width:38px; height:38px; border-radius:10px; cursor:pointer; font-size:1.05rem; box-shadow:var(--shadow-sm); z-index:10;}

.hero{background:linear-gradient(135deg,var(--navy),var(--navy-dark)); color:#fff; padding:2.5rem 1.5rem 2rem; text-align:center; border-radius:0 0 24px 24px; margin-bottom:1.5rem; box-shadow:var(--shadow-lg);}
.hero .eyebrow{text-transform:uppercase; letter-spacing:.1em; font-size:.78rem; font-weight:700; opacity:.85;}
.hero h1{font-size:1.8rem; font-weight:800; margin:.6rem 0 .5rem;}
.hero p{max-width:640px; margin:0 auto .8rem; opacity:.92; font-size:.98rem;}
.racha-chip{display:inline-flex; align-items:center; gap:.4rem; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); padding:.4rem .9rem; border-radius:999px; font-weight:700; font-size:.85rem; margin-top:.3rem;}

.search-wrap{max-width:520px; margin:0 auto -1.5rem; padding:0 1rem; position:relative; z-index:5;}
#search-box{width:100%; padding:.85rem 1.1rem; border:1px solid var(--border-light); border-radius:14px; background:var(--bg-card); color:var(--primary); font-size:.95rem; font-family:inherit; box-shadow:var(--shadow-md);}
#search-box:focus{outline:none; border-color:var(--navy);}

/* ---------- CATÁLOGO: institución → materia/curso → prácticas ---------- */
.inst-section{margin-top:2.75rem; scroll-margin-top:1.25rem;}
.inst-header{display:flex; align-items:center; gap:.9rem; padding-bottom:1rem; margin-bottom:1.5rem; border-bottom:2px solid var(--border-light);}
.inst-icon-big{flex-shrink:0; width:52px; height:52px; border-radius:14px; background:linear-gradient(135deg,var(--navy),var(--navy-dark)); display:flex; align-items:center; justify-content:center; font-size:1.5rem; box-shadow:var(--shadow-sm);}
.inst-name{font-size:1.3rem; font-weight:800; color:var(--primary); margin:0 0 .2rem;}
.inst-stats{font-size:.8rem; color:var(--muted); margin:0; font-weight:600;}

.quick-nav{display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:2rem;}
.quick-nav a{text-decoration:none; background:var(--bg-card); border:1px solid var(--border-light); color:var(--secondary); font-size:.78rem; font-weight:700; padding:.4rem .85rem; border-radius:999px; transition:all .15s ease;}
.quick-nav a:hover{border-color:var(--navy); color:var(--navy); background:var(--blue-bg,#eff6ff);}

.curso-card{background:var(--bg-card); border:1px solid var(--border-light); border-radius:18px; box-shadow:var(--shadow-sm); padding:1.5rem 1.5rem 1.75rem; margin-bottom:1.75rem; scroll-margin-top:1.25rem;}
.curso-head{display:flex; align-items:flex-start; gap:.85rem; margin-bottom:1.1rem;}
.curso-icon{flex-shrink:0; width:42px; height:42px; border-radius:11px; background:var(--bg-body); border:1px solid var(--border-light); display:flex; align-items:center; justify-content:center; font-size:1.25rem;}
.curso-title-wrap{flex:1;}
.curso-tag{display:inline-flex; align-items:center; gap:.3rem; font-size:.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; padding:.2rem .55rem; border-radius:999px; margin-bottom:.4rem;}
.curso-tag.secuencial{background:#fff7e6; color:#946200; border:1px solid var(--gold,#c9982f);}
[data-theme="dark"] .curso-tag.secuencial{background:#2a2108;}
.curso-tag.taller{background:#eff6ff; color:var(--navy); border:1px solid #3b82f6;}
.curso-tag.caso{background:var(--green-bg); color:var(--green); border:1px solid var(--green);}
.group-title{font-size:1.12rem; font-weight:800; color:var(--primary); margin:0;}
.curso-count{font-size:.76rem; color:var(--muted); margin:.2rem 0 0; font-weight:600;}
.cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.25rem;}
.card{background:var(--bg-card); border:1px solid var(--border-light); border-radius:16px; box-shadow:var(--shadow-sm); overflow:hidden; display:flex; flex-direction:column;}
.card-body{padding:1.35rem; flex:1; display:flex; flex-direction:column;}
.card .badge{display:inline-flex; align-self:flex-start; background:#eff6ff; color:var(--navy); border:1px solid #3b82f6; font-weight:700; font-size:.68rem; text-transform:uppercase; letter-spacing:.04em; padding:.25rem .6rem; border-radius:999px; margin-bottom:.65rem;}
.card h3{font-size:1.08rem; font-weight:800; color:var(--primary); margin:0 0 .4rem;}
.card p.desc{font-size:.86rem; color:var(--secondary); margin:0 0 .85rem;}
.meta-row{display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1.1rem;}
.meta-chip{background:var(--bg-body); border:1px solid var(--border-light); border-radius:999px; padding:.25rem .6rem; font-size:.7rem; font-weight:600; color:var(--secondary);}
.card-actions{margin-top:auto; display:flex; gap:.5rem;}
.btn-open{flex:1; text-align:center; background:linear-gradient(135deg,var(--navy),var(--navy-dark)); color:#fff; text-decoration:none; padding:.7rem .8rem; border-radius:12px; font-weight:700; font-size:.85rem; box-shadow:var(--shadow-md);}
.btn-open:hover{filter:brightness(1.08);}
.btn-share{flex-shrink:0; background:var(--bg-body); border:1px solid var(--border-light); color:var(--secondary); border-radius:12px; width:42px; font-size:1.05rem; cursor:pointer;}
.btn-share:hover{border-color:var(--navy); color:var(--navy);}
.qr-wrap{flex-shrink:0; background:#fff; border-radius:10px; padding:5px; border:1px solid var(--border-light); width:56px; height:56px; cursor:pointer;}
.qr-wrap img, .qr-wrap canvas, .qr-wrap table{display:block; width:100% !important; height:100% !important;}
.copied-msg{position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:var(--green-bg); color:var(--green); border:1px solid var(--green); padding:.6rem 1.2rem; border-radius:999px; font-size:.85rem; font-weight:700; box-shadow:var(--shadow-md); z-index:2000; display:none;}
.qr-modal{position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:3000; display:none; align-items:center; justify-content:center; padding:1.5rem;}
.qr-modal.open{display:flex;}
.qr-modal-inner{background:#fff; border-radius:20px; padding:1.75rem; text-align:center; max-width:320px; width:100%;}
.qr-modal-inner h4{color:#0f172a; margin:0 0 1rem; font-size:1rem;}
.qr-modal-inner .qr-big{width:220px; height:220px; margin:0 auto;}
.qr-modal-inner .qr-big img, .qr-modal-inner .qr-big canvas{width:100% !important; height:100% !important;}
.qr-modal-close{margin-top:1.1rem; background:var(--navy); color:#fff; border:none; padding:.6rem 1.4rem; border-radius:10px; font-weight:700; cursor:pointer; font-family:inherit;}

.empty-note{margin-top:2.5rem; text-align:center; color:var(--muted); font-size:.9rem; border:1px dashed var(--border-dark); border-radius:16px; padding:2rem;}
footer{text-align:center; color:var(--muted); font-size:.8rem; padding:2.5rem 1rem 0;}

/* RUTA DE APRENDIZAJE (estilo Duolingo) */
.path-nombre-wrap{display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center;}
.path-nombre-wrap input{flex:1; min-width:200px; padding:.6rem .8rem; border:1px solid var(--border-light); border-radius:10px; background:var(--bg-card); color:var(--primary); font-size:.88rem; font-family:inherit;}
.path-nombre-wrap button{background:var(--navy); color:#fff; border:none; padding:.6rem 1.1rem; border-radius:10px; font-weight:700; font-size:.85rem; cursor:pointer; font-family:inherit;}
.path-hint{font-size:.78rem; color:var(--muted); margin:-1rem 0 1.25rem;}
.path{position:relative; padding:1rem 0;}
.path-node{position:relative; display:flex; align-items:center; gap:1rem; margin-bottom:.4rem; padding-bottom:1.6rem;}
.path-node:not(:last-child)::before{content:""; position:absolute; left:27px; top:56px; width:4px; height:calc(100% - 20px); background:var(--border-light); z-index:0;}
.path-node.completado:not(:last-child)::before{background:var(--green);}
.path-circle{position:relative; z-index:1; flex-shrink:0; width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:800; border:3px solid var(--border-light); background:var(--bg-card); color:var(--muted);}
.path-node.completado .path-circle{background:var(--green); border-color:var(--green); color:#fff;}
.path-node.actual .path-circle{background:var(--gold); border-color:var(--gold); color:#2a1e00; box-shadow:0 0 0 6px rgba(224,169,79,.25);}
.path-node.bloqueado .path-circle{opacity:.55;}
.path-info{flex:1; background:var(--bg-card); border:1px solid var(--border-light); border-radius:14px; padding:.9rem 1.1rem; box-shadow:var(--shadow-sm);}
.path-node.bloqueado .path-info{opacity:.6;}
.path-info .p-badge{font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--gold);}
.path-info h4{margin:.15rem 0 .3rem; font-size:.98rem; color:var(--primary);}
.path-info .p-estado{font-size:.78rem; color:var(--muted);}
.path-info a{display:inline-block; margin-top:.5rem; font-size:.82rem; font-weight:700; color:var(--navy); text-decoration:none;}
.path-node.bloqueado .path-info a{pointer-events:none; color:var(--muted);}
</style>
</head>

var themeBtn = document.getElementById('theme-toggle');
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('portal_theme', t);
}
applyTheme(localStorage.getItem('portal_theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.addEventListener('click', function(){
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

function mostrarCopiado(){
  var msg = document.getElementById('copied-msg');
  msg.style.display = 'block';
  setTimeout(function(){ msg.style.display = 'none'; }, 1800);
}

function compartir(url, titulo){
  if(navigator.share){
    navigator.share({ title: titulo, url: url }).catch(function(){});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(mostrarCopiado);
  } else {
    prompt('Copia el enlace:', url);
  }
}

var qrModal = document.getElementById('qr-modal');
var qrBig = document.getElementById('qr-big');
function abrirQrGrande(url, titulo){
  document.getElementById('qr-modal-title').textContent = titulo;
  qrBig.innerHTML = '';
  if(window.QRCode){
    new QRCode(qrBig, { text: url, width: 220, height: 220, colorDark: '#003877', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  }
  qrModal.classList.add('open');
}
document.getElementById('qr-modal-close').addEventListener('click', function(){ qrModal.classList.remove('open'); });
qrModal.addEventListener('click', function(e){ if(e.target === qrModal) qrModal.classList.remove('open'); });

/* ---------- RUTA DE APRENDIZAJE (estilo Duolingo) ---------- */
var AI_VERIFY_URL = 'https://n8n-inap.167.88.36.13.sslip.io/webhook/inap-verificar-progreso';

function fetchConTimeout(url, options, timeoutMs){
  var controller = new AbortController();
  var timer = setTimeout(function(){ controller.abort(); }, timeoutMs);
  return fetch(url, Object.assign({}, options, { signal: controller.signal }))
    .finally(function(){ clearTimeout(timer); });
}

function verificarUnidad(nombre, curso, unidadActual){
  return fetchConTimeout(AI_VERIFY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nombre: nombre, curso: curso, unidad_actual: unidadActual })
  }, 15000).then(function(res){
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }).catch(function(){ return { ok:false, desbloqueado:false }; });
}

function construirRuta(curso){
  var wrap = document.createElement('div');
  var nombreGuardado = localStorage.getItem('portal_nombre_estudiante') || '';
  wrap.innerHTML =
    '<div class="path-nombre-wrap">' +
      '<input type="text" id="ruta-nombre" placeholder="Tu nombre completo (para ver tu progreso real)" value="' + nombreGuardado.replace(/"/g,'&quot;') + '">' +
      '<button type="button" id="ruta-verificar">🔍 Ver mi progreso</button>' +
    '</div>' +
    '<p class="path-hint">Escribe tu nombre igual a como lo usaste al completar cada unidad, para ver cuáles ya aprobaste.</p>' +
    '<div id="ruta-resumen"></div>' +
    '<div class="path" id="ruta-nodos"></div>';

  var nodosEl = wrap.querySelector('#ruta-nodos');
  function pintarNodos(estados){
    nodosEl.innerHTML = '';
    curso.practicas.forEach(function(p, i){
      var estado = estados ? estados[i] : (i === 0 ? 'actual' : 'bloqueado');
      var node = document.createElement('div');
      node.className = 'path-node ' + estado;
      var icono = estado === 'completado' ? '✔' : (estado === 'actual' ? (i+1) : '🔒');
      node.innerHTML =
        '<div class="path-circle">' + icono + '</div>' +
        '<div class="path-info">' +
          '<span class="p-badge">' + p.badge + '</span>' +
          '<h4>' + p.titulo + '</h4>' +
          '<p class="p-estado">' + (estado === 'completado' ? '✅ Ya aprobada' : (estado === 'actual' ? '▶️ Disponible ahora' : '🔒 Completa la unidad anterior primero')) + '</p>' +
          (estado !== 'bloqueado' ? '<a href="' + p.url + '" target="_blank" rel="noopener">Abrir práctica →</a>' : '') +
        '</div>';
      nodosEl.appendChild(node);
    });
  }
  pintarNodos(null);

  wrap.querySelector('#ruta-verificar').addEventListener('click', function(){
    var nombre = (wrap.querySelector('#ruta-nombre').value || '').trim();
    var resumenEl = wrap.querySelector('#ruta-resumen');
    if(!nombre){
      wrap.querySelector('#ruta-nombre').focus();
      return;
    }
    localStorage.setItem('portal_nombre_estudiante', nombre);
    resumenEl.innerHTML = '<p style="color:var(--muted); font-size:.85rem;">Consultando tu progreso…</p>';

    var practicas = curso.practicas;
    var chequeos = [];
    // La unidad 1 nunca requiere prerequisito -- se asume disponible.
    // Para saber si la unidad i fue APROBADA, se verifica si la unidad i+1 quedo desbloqueada.
    for(var i = 1; i < practicas.length; i++){
      chequeos.push(verificarUnidad(nombre, curso.cursoId, practicas[i].unidad));
    }

    Promise.all(chequeos).then(function(resultados){
      // resultados[i] indica si la unidad de indice i (0 = u1) ya fue aprobada
      // (se infiere consultando si la unidad SIGUIENTE quedo desbloqueada).
      // La ultima practica (Trabajo Final) nunca tiene una "siguiente" que confirme
      // si ella misma fue aprobada -- por eso solo se marca completado hasta donde
      // hay evidencia real, y se deja "actual" (disponible) en vez de inventar un
      // estado que no podemos verificar.
      var estados = [];
      var completadas = 0;
      var yaHayActual = false;
      for(var i = 0; i < practicas.length; i++){
        var aprobada = i < resultados.length && !!resultados[i].desbloqueado;
        if(aprobada){
          estados[i] = 'completado';
          completadas++;
        } else if(!yaHayActual){
          estados[i] = 'actual';
          yaHayActual = true;
        } else {
          estados[i] = 'bloqueado';
        }
      }
      pintarNodos(estados);
      resumenEl.innerHTML = '<span class="racha-chip" style="color:var(--gold); border-color:var(--gold); background:rgba(224,169,79,.12);">🔥 ' + completadas + ' de ' + (practicas.length - 1) + ' unidades completadas</span>';
    });
  });

  return wrap;
}

var instEl = document.getElementById('instituciones');

function slugify(s){
  return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

function render(filtro){
  filtro = (filtro || '').toLowerCase().trim();
  instEl.innerHTML = '';
  var totalVisible = 0;

  INSTITUCIONES.forEach(function(inst, instIdx){
    var cursosConResultados = inst.cursos.map(function(curso){
      var practicasFiltradas = curso.practicas.filter(function(p){
        if(!filtro) return true;
        var texto = (inst.nombre + ' ' + curso.nombre + ' ' + p.titulo + ' ' + p.badge + ' ' + p.desc).toLowerCase();
        return texto.indexOf(filtro) !== -1;
      });
      return { def: curso, practicas: practicasFiltradas };
    }).filter(function(c){ return c.practicas.length > 0; });

    if(!cursosConResultados.length) return;

    var instSlug = 'inst-' + (slugify(inst.nombre) || instIdx);
    var totalPracticasInst = cursosConResultados.reduce(function(n,c){ return n + c.practicas.length; }, 0);

    var instSection = document.createElement('section');
    instSection.className = 'inst-section';
    instSection.id = instSlug;

    var header = document.createElement('div');
    header.className = 'inst-header';
    header.innerHTML =
      '<div class="inst-icon-big">' + (inst.icono || '🏛️') + '</div>' +
      '<div>' +
        '<h2 class="inst-name">' + inst.nombre + '</h2>' +
        '<p class="inst-stats">' + cursosConResultados.length + ' curso' + (cursosConResultados.length === 1 ? '' : 's') + ' / materia' + (cursosConResultados.length === 1 ? '' : 's') + ' · ' + totalPracticasInst + ' práctica' + (totalPracticasInst === 1 ? '' : 's') + '</p>' +
      '</div>';
    instSection.appendChild(header);

    if(cursosConResultados.length > 1){
      var quickNav = document.createElement('div');
      quickNav.className = 'quick-nav';
      cursosConResultados.forEach(function(c){
        var a = document.createElement('a');
        a.href = '#curso-' + slugify(c.def.nombre);
        a.textContent = (c.def.icono || '📘') + ' ' + c.def.nombre;
        quickNav.appendChild(a);
      });
      instSection.appendChild(quickNav);
    }

    cursosConResultados.forEach(function(c){
      var curso = c.def;
      var cursoCard = document.createElement('div');
      cursoCard.className = 'curso-card';
      cursoCard.id = 'curso-' + slugify(curso.nombre);

      var head = document.createElement('div');
      head.className = 'curso-head';
      head.innerHTML =
        '<div class="curso-icon">' + (curso.icono || '📘') + '</div>' +
        '<div class="curso-title-wrap">' +
          '<span class="curso-tag ' + (curso.tipoClase || 'taller') + '">' + (curso.tipoLabel || 'Taller') + '</span>' +
          '<h3 class="group-title">' + curso.nombre + '</h3>' +
          '<p class="curso-count">' + c.practicas.length + (curso.esSecuencial ? ' unidades' : (c.practicas.length === 1 ? ' práctica' : ' prácticas')) + '</p>' +
        '</div>';
      cursoCard.appendChild(head);

      if(curso.esSecuencial && !filtro){
        cursoCard.appendChild(construirRuta(curso));
        instSection.appendChild(cursoCard);
        return;
      }

      var cardsWrap = document.createElement('div');
      cardsWrap.className = 'cards';
      c.practicas.forEach(function(p){
        totalVisible++;
        var qrId = 'qr-' + (totalVisible);
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML =
          '<div class="card-body">' +
            '<span class="badge">' + p.badge + '</span>' +
            '<h3>' + p.titulo + '</h3>' +
            '<p class="desc">' + p.desc + '</p>' +
            '<div class="meta-row">' +
              '<span class="meta-chip">⏱️ ' + p.duracion + '</span>' +
              '<span class="meta-chip">🧮 ' + p.puntos + '</span>' +
              '<span class="meta-chip">✅ ' + p.aprobacion + '</span>' +
            '</div>' +
            '<div class="card-actions">' +
              '<a class="btn-open" href="' + p.url + '" target="_blank" rel="noopener">📤 Abrir</a>' +
              '<button class="btn-share" type="button" title="Compartir enlace" aria-label="Compartir enlace">🔗</button>' +
              '<div class="qr-wrap" id="' + qrId + '" title="Toca para ampliar el QR"></div>' +
            '</div>' +
          '</div>';
        card.querySelector('.btn-share').addEventListener('click', function(){
          compartir(p.url, p.titulo);
        });
        var qrEl = card.querySelector('#' + qrId);
        if(window.QRCode){
          new QRCode(qrEl, { text: p.url, width: 56, height: 56, colorDark: '#003877', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
        } else {
          qrEl.style.display = 'none';
        }
        qrEl.addEventListener('click', function(){ abrirQrGrande(p.url, p.titulo); });
        cardsWrap.appendChild(card);
      });
      cursoCard.appendChild(cardsWrap);
      instSection.appendChild(cursoCard);
    });

    instEl.appendChild(instSection);
  });

  if(!totalVisible && !instEl.querySelector('.inst-section')){
    instEl.innerHTML = '<div class="empty-note">No se encontraron prácticas que coincidan con "' + filtro + '".</div>';
  }
}

render('');
document.getElementById('search-box').addEventListener('input', function(e){
  render(e.target.value);
});
})();
</script>
</body>
