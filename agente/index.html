<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JohanGPT — Asistente personal de Johan Tapia</title>
<meta name="description" content="Asistente de IA personal con acceso total al ecosistema VPS, GitHub, n8n y Ollama.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b0d12">
<meta property="og:title" content="JohanGPT">
<meta property="og:description" content="Asistente de IA personal de Johan Tapia.">
<meta property="og:image" content="https://johantbueno.github.io/practicas-web/agente/avatar.png">
<link rel="icon" href="avatar.png">
<link rel="apple-touch-icon" href="avatar.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
:root{
  --bg:#0b0d12; --panel:#12151c; --border:#242938; --text:#d5dae3; --muted:#6b7386;
  --accent:#5fb98a; --user:#3b82f6; --err:#ef4444;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',ui-monospace,Consolas,monospace; height:100vh; overflow:hidden;}
#app{display:flex; height:100vh;}

#sidebar{width:260px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto;}
#sidebar-header{padding:.8rem; border-bottom:1px solid var(--border); flex-shrink:0;}
#new-conv-btn{width:100%; background:var(--accent); color:#04170d; border:none; border-radius:8px; padding:.6rem; font-weight:700; cursor:pointer; font-family:inherit; font-size:.82rem;}
#conv-list{flex:1; overflow-y:auto; padding:.5rem;}
.conv-item{display:flex; align-items:center; gap:.4rem; padding:.55rem .6rem; border-radius:8px; cursor:pointer; font-size:.8rem; color:var(--muted); margin-bottom:.15rem;}
.conv-item:hover{background:#1a1f2b;}
.conv-item.active{background:#1a2a3f; color:var(--text);}
.conv-item .conv-title{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.conv-item .conv-del{background:none; border:none; color:var(--muted); cursor:pointer; opacity:0; font-size:.85rem; padding:.1rem .3rem; flex-shrink:0;}
.conv-item:hover .conv-del{opacity:1;}
#sidebar-backdrop{display:none;}
body.generating #sidebar{pointer-events:none; opacity:.55;}

#main{flex:1; display:flex; flex-direction:column; min-width:0;}
header{padding:.9rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.6rem; flex-shrink:0;}
header h1{font-size:.95rem; margin:0; font-weight:700; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.avatar-wrap{position:relative; flex-shrink:0; line-height:0;}
.header-avatar{width:26px; height:26px; border-radius:50%; object-fit:cover; display:block;}
header .dot{position:absolute; bottom:-1px; right:-1px; width:8px; height:8px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); flex-shrink:0;}
#menu-btn{display:none; background:none; border:none; color:var(--text); font-size:1.15rem; cursor:pointer; padding:.2rem .4rem; flex-shrink:0;}
#clear-conv-btn{margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:.2rem .5rem; flex-shrink:0;}
#clear-conv-btn:hover{color:var(--err);}
body.generating #clear-conv-btn{pointer-events:none; opacity:.4;}

#log{flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:1rem;}
.welcome{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:.6rem; padding:2rem; color:var(--muted);}
.welcome-avatar{width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); margin-bottom:.3rem;}
.welcome h2{margin:0; font-size:1.05rem; color:var(--text);}
.welcome p{margin:0; font-size:.82rem; max-width:360px; line-height:1.5;}
.msg{max-width:min(760px,90%); white-space:pre-wrap; word-wrap:break-word; line-height:1.55; font-size:.88rem;}
.msg .head{display:flex; align-items:center; gap:.35rem; margin-bottom:.3rem;}
.msg.user .head{flex-direction:row-reverse;}
.msg .avatar{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; background:var(--panel); border:1px solid var(--border); flex-shrink:0; object-fit:cover;}
.msg .avatar-bot{background:linear-gradient(135deg, var(--accent), #2d7a56); color:#04170d; font-weight:700; font-size:.6rem; letter-spacing:.02em; border-color:transparent;}
.msg .avatar-error{background:#2a1212;}
.msg .who{font-size:.72rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
.msg .ts{font-size:.65rem; color:var(--muted); font-weight:400;}
.msg.user{align-self:flex-end;}
.msg.user .who{color:var(--user);}
.msg.user .body{background:#132036; border:1px solid #24365a; border-radius:10px 10px 2px 10px; padding:.7rem .9rem;}
.msg.agent .who{color:var(--accent);}
.msg.agent .body{background:var(--panel); border:1px solid var(--border); border-radius:10px 10px 10px 2px; padding:.7rem .9rem;}
.msg.error .body{background:#2a1212; border:1px solid var(--err); color:#fca5a5; border-radius:10px;}
@keyframes pulse{0%,100%{opacity:.55} 50%{opacity:1}}
.msg.pending .body{color:var(--muted); font-style:italic;}
.msg.agent .body p{margin:.4em 0;}
.msg.agent .body p:first-child{margin-top:0;}
.msg.agent .body code{background:#0f1830; border-radius:4px; padding:.1em .35em; font-size:.85em;}
.msg.agent .body pre{background:#0f1830; border:1px solid var(--border); border-radius:8px; padding:.7rem .8rem; overflow-x:auto; position:relative;}
.msg.agent .body pre code{background:none; padding:0;}
.msg.agent .body ul, .msg.agent .body ol{margin:.4em 0; padding-left:1.4em;}
.msg.agent .body a{color:var(--user);}
.copy-code-btn{position:absolute; top:.4rem; right:.4rem; background:var(--panel); border:1px solid var(--border); color:var(--muted); font-size:.65rem; padding:.15rem .5rem; border-radius:6px; cursor:pointer; opacity:0; transition:opacity .15s;}
.msg.agent .body pre:hover .copy-code-btn{opacity:1;}
.copy-msg-btn{display:inline-block; margin-top:.5rem; background:none; border:none; color:var(--muted); cursor:pointer; font-size:.72rem; padding:.15rem 0; opacity:.75;}
.copy-msg-btn:hover{opacity:1; color:var(--accent);}
.msg.pending .pending-text{animation:pulse 1.4s ease-in-out infinite;}
.todo-list{margin-top:.55rem; display:flex; flex-direction:column; gap:.3rem; font-style:normal;}
.todo-item{display:flex; align-items:center; gap:.45rem; font-size:.78rem; color:var(--muted); line-height:1.3;}
.todo-item.todo-completed{text-decoration:line-through; opacity:.6;}
.todo-item.todo-in_progress{color:var(--accent); font-weight:600;}
.todo-icon{flex-shrink:0; font-size:.75em;}
.retry-btn{display:block; margin-top:.6rem; background:var(--panel); border:1px solid var(--border); color:var(--text); font-size:.78rem; padding:.35rem .8rem; border-radius:8px; cursor:pointer;}
.retry-btn:hover{border-color:var(--accent);}
.msg-image{max-width:280px; max-height:280px; border-radius:10px; border:1px solid var(--border); margin-top:.5rem; cursor:zoom-in; display:block;}
.files-box{margin-top:.6rem; display:flex; flex-wrap:wrap; gap:.5rem;}
.files-box a{display:inline-flex; align-items:center; gap:.4rem; background:#0f1830; border:1px solid var(--border); border-radius:8px; padding:.4rem .7rem; font-size:.78rem; color:var(--accent); text-decoration:none;}
.files-box a:hover{border-color:var(--accent);}

#attachments{padding:0 1.25rem; display:flex; flex-wrap:wrap; gap:.5rem; flex-shrink:0;}
#attachments:empty{display:none;}
.attach-chip{display:flex; align-items:center; gap:.4rem; background:var(--panel); border:1px solid var(--border); border-radius:999px; padding:.3rem .5rem .3rem .8rem; font-size:.76rem; color:var(--muted);}
.attach-chip.uploading{color:var(--accent);}
.attach-chip button{background:none; border:none; color:var(--muted); cursor:pointer; font-size:.9rem; line-height:1; padding:.1rem .3rem;}

#composer{border-top:1px solid var(--border); padding:.9rem 1.25rem; display:flex; gap:.6rem; flex-shrink:0; align-items:flex-end;}
#composer textarea{flex:1; resize:none; min-height:2.6rem; max-height:9rem; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.6rem .8rem; font-family:inherit; font-size:.9rem;}
#composer textarea:focus{outline:none; border-color:var(--accent);}
#composer button{background:var(--accent); color:#04170d; border:none; border-radius:8px; padding:0 1.3rem; font-weight:700; cursor:pointer; font-family:inherit; font-size:.85rem;}
#composer button:disabled{opacity:.5; cursor:wait;}
#attach-btn{background:var(--panel); border:1px solid var(--border); color:var(--text); padding:0 .9rem; height:2.6rem; font-size:1.1rem;}
#stop{background:var(--err); color:#fff; height:2.6rem;}

#lightbox{position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:50;}
#lightbox[hidden]{display:none;}
#lightbox img{max-width:92vw; max-height:88vh; border-radius:8px;}
#lightbox-close{position:absolute; top:1rem; right:1.2rem; background:none; border:none; color:#fff; font-size:1.8rem; cursor:pointer; line-height:1;}

#gate{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:60;}
#gate.hidden{display:none;}
#gate .box{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:2rem; width:min(360px,90vw); text-align:center;}
.gate-avatar{width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--accent);}
#gate input{width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.6rem .8rem; font-family:inherit; margin:1rem 0; box-sizing:border-box;}
#gate button{width:100%; background:var(--accent); color:#04170d; border:none; border-radius:8px; padding:.65rem; font-weight:700; cursor:pointer; font-family:inherit;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

@media (max-width:768px){
  #sidebar{position:fixed; inset:0 20% 0 0; z-index:20; transform:translateX(-100%); transition:transform .2s; width:auto;}
  body.sidebar-open #sidebar{transform:translateX(0);}
  #menu-btn{display:inline-block;}
  body.sidebar-open #sidebar-backdrop{display:block; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:19;}
}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <img src="avatar.png" alt="Johan Tapia" class="gate-avatar">
    <div style="font-weight:700; color:var(--accent); margin:.6rem 0 .2rem;">JohanGPT</div>
    <div style="font-size:.75rem; color:var(--muted); margin-bottom:.6rem;">Tu asistente personal</div>
    <div style="font-size:.8rem; color:var(--muted);">Clave de acceso</div>
    <input type="password" id="gate-key" placeholder="Clave" autocomplete="off">
    <button id="gate-btn" type="button">Entrar</button>
  </div>
</div>

<div id="sidebar-backdrop"></div>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <button id="new-conv-btn" type="button">+ Nueva conversación</button>
    </div>
    <div id="conv-list"></div>
  </aside>

  <div id="main">
    <header>
      <button id="menu-btn" type="button" title="Conversaciones">☰</button>
      <span class="avatar-wrap">
        <img src="avatar.png" alt="" class="header-avatar">
        <span class="dot" title="En línea"></span>
      </span>
      <h1 id="conv-title">JohanGPT</h1>
      <button id="clear-conv-btn" type="button" title="Borrar esta conversación">🗑</button>
    </header>

    <div id="log"></div>

    <div id="attachments"></div>

    <div id="composer">
      <button id="attach-btn" type="button" title="Adjuntar archivo o foto">📎</button>
      <input type="file" id="file-input" multiple hidden>
      <textarea id="input" placeholder="Escribe una instrucción para JohanGPT…" rows="1"></textarea>
      <button id="stop" type="button" hidden>⏹ Detener</button>
      <button id="send" type="button">Enviar</button>
    </div>
  </div>
</div>

<div id="lightbox" hidden>
  <button id="lightbox-close" type="button">✕</button>
  <img id="lightbox-img" alt="">
</div>

<script>
(function(){
"use strict";

var AGENT_URL = 'https://agente.plataforma.cfd/agent';
var UPLOAD_URL = 'https://agente.plataforma.cfd/upload';
var DOWNLOAD_URL = 'https://agente.plataforma.cfd/download';
var KEY_STORAGE = 'vps_agent_key';
var CONV_STORAGE = 'johangpt_conversations_v1';
var ACTIVE_STORAGE = 'johangpt_active_id';
var OLD_HISTORY_STORAGE = 'johangpt_history_v1';
var IMAGE_EXT_RE = /\.(jpe?g|png|gif|webp)$/i;

var gate = document.getElementById('gate');
var gateKey = document.getElementById('gate-key');
var gateBtn = document.getElementById('gate-btn');
var log = document.getElementById('log');
var input = document.getElementById('input');
var sendBtn = document.getElementById('send');
var stopBtn = document.getElementById('stop');
var attachBtn = document.getElementById('attach-btn');
var fileInput = document.getElementById('file-input');
var attachmentsEl = document.getElementById('attachments');
var menuBtn = document.getElementById('menu-btn');
var newConvBtn = document.getElementById('new-conv-btn');
var convListEl = document.getElementById('conv-list');
var convTitleEl = document.getElementById('conv-title');
var clearConvBtn = document.getElementById('clear-conv-btn');
var sidebarBackdrop = document.getElementById('sidebar-backdrop');
var lightbox = document.getElementById('lightbox');
var lightboxImg = document.getElementById('lightbox-img');
var lightboxClose = document.getElementById('lightbox-close');

var attachedFiles = []; // { name, path, uploading }
var conversations = [];
var activeId = null;
var isGenerating = false;
var activeController = null;
var userStoppedFlag = false;

function getKey(){ try{ return localStorage.getItem(KEY_STORAGE) || ''; }catch(e){ return ''; } }
function setKey(k){ try{ localStorage.setItem(KEY_STORAGE, k); }catch(e){} }
function genId(){ return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function timeLabel(ts){
  var d = new Date(ts || Date.now());
  var hh = String(d.getHours()).padStart(2, '0');
  var mm = String(d.getMinutes()).padStart(2, '0');
  return hh + ':' + mm;
}

// ---- Conversaciones (localStorage) ----

function saveConversations(){
  try{ localStorage.setItem(CONV_STORAGE, JSON.stringify(conversations.slice(0, 50))); }catch(e){}
}
function saveActiveId(){
  try{ localStorage.setItem(ACTIVE_STORAGE, activeId || ''); }catch(e){}
}

function titleFromMessages(messages){
  var firstUser = messages.filter(function(m){ return m.cls === 'user'; })[0];
  var t = firstUser ? (firstUser.text || '').trim() : '';
  if(!t) return 'Nueva conversación';
  return t.length > 42 ? t.slice(0, 42) + '…' : t;
}

function loadConversations(){
  try{ conversations = JSON.parse(localStorage.getItem(CONV_STORAGE) || '[]'); }catch(e){ conversations = []; }
  if(!conversations.length){
    // Migracion desde el historial plano de la version anterior (una sola conversacion)
    var oldHistory = [];
    try{ oldHistory = JSON.parse(localStorage.getItem(OLD_HISTORY_STORAGE) || '[]'); }catch(e){}
    if(oldHistory.length){
      conversations.push({
        id: genId(),
        title: titleFromMessages(oldHistory),
        sessionId: null,
        messages: oldHistory,
        updatedAt: Date.now()
      });
      saveConversations();
    }
  }
  var savedActive = null;
  try{ savedActive = localStorage.getItem(ACTIVE_STORAGE); }catch(e){}
  if(savedActive && conversations.some(function(c){ return c.id === savedActive; })){
    activeId = savedActive;
  } else if(conversations.length){
    activeId = conversations[0].id;
  } else {
    activeId = null;
  }
}

function getActiveConversation(){
  return conversations.filter(function(c){ return c.id === activeId; })[0] || null;
}

function createConversation(){
  var conv = { id: genId(), title: 'Nueva conversación', sessionId: null, messages: [], updatedAt: Date.now() };
  conversations.unshift(conv);
  activeId = conv.id;
  saveConversations();
  saveActiveId();
  return conv;
}

function ensureConversation(){
  if(!getActiveConversation()){ createConversation(); }
}

function switchConversation(id){
  if(isGenerating) return;
  activeId = id;
  saveActiveId();
  renderConversation();
  renderSidebar();
  closeSidebarMobile();
}

function deleteConversation(id){
  if(isGenerating && id === activeId) return;
  if(!confirm('¿Borrar esta conversación? No se puede deshacer.')) return;
  conversations = conversations.filter(function(c){ return c.id !== id; });
  if(id === activeId){ activeId = conversations.length ? conversations[0].id : null; }
  ensureConversation();
  saveConversations();
  saveActiveId();
  renderConversation();
  renderSidebar();
}

function renderSidebar(){
  convListEl.innerHTML = '';
  conversations.forEach(function(c){
    var row = document.createElement('div');
    row.className = 'conv-item' + (c.id === activeId ? ' active' : '');
    var title = document.createElement('span');
    title.className = 'conv-title';
    title.textContent = c.title || 'Nueva conversación';
    var del = document.createElement('button');
    del.type = 'button';
    del.className = 'conv-del';
    del.textContent = '🗑';
    del.title = 'Borrar conversación';
    del.addEventListener('click', function(e){ e.stopPropagation(); deleteConversation(c.id); });
    row.appendChild(title);
    row.appendChild(del);
    row.addEventListener('click', function(){ switchConversation(c.id); });
    convListEl.appendChild(row);
  });
}

function renderConversation(){
  log.innerHTML = '';
  var conv = getActiveConversation();
  convTitleEl.textContent = conv ? (conv.title || 'Nueva conversación') : 'JohanGPT';
  if(conv && conv.messages.length){
    conv.messages.forEach(function(entry){ addMsg(entry, false); });
  } else {
    renderWelcome();
  }
}

function renderWelcome(){
  var box = document.createElement('div');
  box.className = 'welcome';
  box.innerHTML =
    '<img src="avatar.png" alt="" class="welcome-avatar">' +
    '<h2>¿En qué trabajamos hoy?</h2>' +
    '<p>Tengo acceso total al VPS, GitHub, n8n y Ollama. Pídeme lo que necesites — desde revisar un servidor hasta generar una imagen.</p>';
  log.appendChild(box);
}

function openSidebarMobile(){ document.body.classList.add('sidebar-open'); }
function closeSidebarMobile(){ document.body.classList.remove('sidebar-open'); }

// ---- Puerta de acceso ----

function openChat(){
  gate.classList.add('hidden');
  loadConversations();
  ensureConversation();
  renderConversation();
  renderSidebar();
  input.focus();
}

gateBtn.addEventListener('click', function(){
  var k = gateKey.value.trim();
  if(!k) return;
  setKey(k);
  openChat();
});
gateKey.addEventListener('keydown', function(e){ if(e.key === 'Enter') gateBtn.click(); });

menuBtn.addEventListener('click', function(){ document.body.classList.toggle('sidebar-open'); });
sidebarBackdrop.addEventListener('click', closeSidebarMobile);

newConvBtn.addEventListener('click', function(){
  if(isGenerating) return;
  createConversation();
  renderConversation();
  renderSidebar();
  closeSidebarMobile();
  input.focus();
});

clearConvBtn.addEventListener('click', function(){
  var conv = getActiveConversation();
  if(!conv || isGenerating) return;
  deleteConversation(conv.id);
});

// ---- Lightbox de imagenes ----

function openLightbox(src){
  lightboxImg.src = src;
  lightbox.hidden = false;
}
function closeLightbox(){
  lightbox.hidden = true;
  lightboxImg.src = '';
}
lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', function(e){ if(e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && !lightbox.hidden) closeLightbox(); });

// ---- Render de mensajes ----

function copyText(text, btn){
  var done = function(){
    if(!btn) return;
    var old = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(function(){ btn.textContent = old; }, 1200);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(done);
  } else {
    done();
  }
}

function addCodeCopyButtons(body){
  Array.prototype.forEach.call(body.querySelectorAll('pre'), function(pre){
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'copy-code-btn';
    btn.textContent = 'Copiar';
    btn.addEventListener('click', function(){
      var codeEl = pre.querySelector('code');
      copyText(codeEl ? codeEl.textContent : pre.textContent, btn);
    });
    pre.appendChild(btn);
  });
}

function renderFilesBox(container, files){
  if(!files || !files.length) return;
  var images = files.filter(function(f){ return IMAGE_EXT_RE.test(f.name); });
  var others = files.filter(function(f){ return !IMAGE_EXT_RE.test(f.name); });
  images.forEach(function(f){
    var img = document.createElement('img');
    img.className = 'msg-image';
    img.src = DOWNLOAD_URL + '?key=' + encodeURIComponent(getKey()) + '&file=' + encodeURIComponent(f.name);
    img.alt = f.name;
    img.addEventListener('click', function(){ openLightbox(img.src); });
    container.appendChild(img);
  });
  if(others.length){
    var box = document.createElement('div');
    box.className = 'files-box';
    others.forEach(function(f){
      var a = document.createElement('a');
      a.href = DOWNLOAD_URL + '?key=' + encodeURIComponent(getKey()) + '&file=' + encodeURIComponent(f.name);
      a.textContent = '⬇️ ' + f.name;
      a.target = '_blank';
      box.appendChild(a);
    });
    container.appendChild(box);
  }
}

function renderTodoList(box, items){
  box.innerHTML = '';
  if(!items || !items.length) return;
  items.forEach(function(t){
    var row = document.createElement('div');
    row.className = 'todo-item todo-' + t.status;
    var icon = document.createElement('span');
    icon.className = 'todo-icon';
    icon.textContent = t.status === 'completed' ? '✅' : (t.status === 'in_progress' ? '▶' : '○');
    var label = document.createElement('span');
    label.textContent = (t.status === 'in_progress' && t.activeForm) ? t.activeForm : t.subject;
    row.appendChild(icon);
    row.appendChild(label);
    box.appendChild(row);
  });
}

// entry: { who, text, cls, markdown, files, todos, ts, retryMessage }. persist=false para mensajes temporales
function addMsg(entry, persist){
  if(!entry.ts) entry.ts = Date.now();
  var div = document.createElement('div');
  div.className = 'msg ' + entry.cls;

  var head = document.createElement('div');
  head.className = 'head';
  var isUser = entry.cls.indexOf('user') !== -1;
  var isError = entry.cls.indexOf('error') !== -1;
  var avatar;
  if(isUser){
    avatar = document.createElement('img');
    avatar.className = 'avatar';
    avatar.src = 'avatar.png';
    avatar.alt = 'Tú';
  } else {
    avatar = document.createElement('span');
    avatar.className = 'avatar' + (isError ? ' avatar-error' : ' avatar-bot');
    avatar.textContent = isError ? '⚠️' : 'JG';
  }
  var label = document.createElement('span');
  label.className = 'who';
  label.textContent = entry.who;
  var tsEl = document.createElement('span');
  tsEl.className = 'ts';
  tsEl.textContent = timeLabel(entry.ts);
  head.appendChild(avatar);
  head.appendChild(label);
  head.appendChild(tsEl);
  div.appendChild(head);

  var body = document.createElement('div');
  body.className = 'body';
  if(entry.markdown && window.marked){
    body.innerHTML = marked.parse(entry.text || '');
    addCodeCopyButtons(body);
  } else {
    body.textContent = entry.text;
  }
  div.appendChild(body);

  renderFilesBox(body, entry.files);
  if(entry.todos && entry.todos.length){
    var todoBox = document.createElement('div');
    todoBox.className = 'todo-list';
    body.appendChild(todoBox);
    renderTodoList(todoBox, entry.todos);
  }

  if(entry.cls === 'agent' && entry.text){
    var copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'copy-msg-btn';
    copyBtn.textContent = '📋 Copiar';
    copyBtn.addEventListener('click', function(){ copyText(entry.text, copyBtn); });
    body.appendChild(copyBtn);
  }
  if(entry.cls === 'error' && entry.retryMessage){
    var retryBtn = document.createElement('button');
    retryBtn.type = 'button';
    retryBtn.className = 'retry-btn';
    retryBtn.textContent = '↻ Reintentar';
    retryBtn.addEventListener('click', function(){ runAgentRequest(entry.retryMessage); });
    body.appendChild(retryBtn);
  }

  var welcomeEl = log.querySelector('.welcome');
  if(welcomeEl) welcomeEl.remove();
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  div._body = body;

  if(persist !== false){
    var conv = getActiveConversation();
    if(conv){
      conv.messages.push(entry);
      conv.updatedAt = Date.now();
      if(entry.cls === 'user' && (!conv.title || conv.title === 'Nueva conversación')){
        conv.title = titleFromMessages(conv.messages);
      }
      saveConversations();
      renderSidebar();
      convTitleEl.textContent = conv.title || 'Nueva conversación';
    }
  }
  return div;
}

// ---- Composer / adjuntos ----

function autoGrow(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 144) + 'px';
}
input.addEventListener('input', autoGrow);
input.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});

function renderAttachments(){
  attachmentsEl.innerHTML = '';
  attachedFiles.forEach(function(f, i){
    var chip = document.createElement('div');
    chip.className = 'attach-chip' + (f.uploading ? ' uploading' : '');
    var label = document.createElement('span');
    label.textContent = (f.uploading ? '⏳ ' : '📄 ') + f.name;
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.textContent = '✕';
    rm.title = 'Quitar';
    rm.addEventListener('click', function(){ attachedFiles.splice(i, 1); renderAttachments(); });
    chip.appendChild(label);
    chip.appendChild(rm);
    attachmentsEl.appendChild(chip);
  });
}

function uploadFile(file){
  var entry = { name: file.name, path: null, uploading: true };
  attachedFiles.push(entry);
  renderAttachments();
  var key = getKey();
  fetch(UPLOAD_URL, {
    method: 'POST',
    headers: { 'X-Agent-Key': key, 'X-File-Name': file.name, 'Content-Type': 'application/octet-stream' },
    body: file
  }).then(function(res){ return res.json(); })
    .then(function(data){
      entry.uploading = false;
      if(data.ok){ entry.path = data.path; }
      else { entry.name += ' (error al subir)'; }
      renderAttachments();
    }).catch(function(){
      entry.uploading = false;
      entry.name += ' (error al subir)';
      renderAttachments();
    });
}

attachBtn.addEventListener('click', function(){
  if(!getKey()){ gate.classList.remove('hidden'); return; }
  fileInput.click();
});
fileInput.addEventListener('change', function(){
  Array.prototype.forEach.call(fileInput.files, uploadFile);
  fileInput.value = '';
});

// ---- Envio y streaming ----

function send(){
  var message = input.value.trim();
  var pendingUploads = attachedFiles.some(function(f){ return f.uploading; });
  if(!message && attachedFiles.length === 0) return;
  if(pendingUploads){ alert('Espera a que terminen de subirse los archivos adjuntos.'); return; }
  if(isGenerating) return;
  var key = getKey();
  if(!key){ gate.classList.remove('hidden'); return; }

  var readyFiles = attachedFiles.filter(function(f){ return f.path; });
  var fullMessage = message;
  if(readyFiles.length){
    var fileList = readyFiles.map(function(f){ return '- ' + f.path + ' (nombre original: ' + f.name + ')'; }).join('\n');
    fullMessage = 'Archivos adjuntos disponibles en el servidor:\n' + fileList + '\n\n' + (message || 'Revisa el/los archivo(s) adjunto(s) y cuéntame qué contienen.');
  }

  addMsg({ who: 'Tú', text: message || '(archivo adjunto sin mensaje)', cls: 'user' });
  input.value = '';
  attachedFiles = [];
  renderAttachments();
  autoGrow();

  runAgentRequest(fullMessage);
}

function updateGeneratingUI(){
  document.body.classList.toggle('generating', isGenerating);
  sendBtn.hidden = isGenerating;
  stopBtn.hidden = !isGenerating;
}

function runAgentRequest(fullMessage){
  ensureConversation();
  var conv = getActiveConversation();
  isGenerating = true;
  userStoppedFlag = false;
  updateGeneratingUI();

  var pendingDiv = addMsg({ who: 'JohanGPT', text: '', cls: 'agent pending' }, false);
  var statusEl = document.createElement('div');
  statusEl.className = 'pending-text';
  statusEl.textContent = 'Pensando…';
  var todoBox = document.createElement('div');
  todoBox.className = 'todo-list';
  pendingDiv._body.appendChild(statusEl);
  pendingDiv._body.appendChild(todoBox);
  var streamedText = '';
  var latestTodos = [];

  var controller = new AbortController();
  activeController = controller;
  var timer = setTimeout(function(){ controller.abort(); }, 290000);

  var key = getKey();
  fetch(AGENT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Agent-Key': key },
    body: JSON.stringify({ message: fullMessage, sessionId: conv.sessionId || undefined }),
    signal: controller.signal
  }).then(function(res){
    if(res.status === 401){ throw new Error('CLAVE_INVALIDA'); }
    if(res.status === 429){ throw new Error('LIMITE_USO'); }
    if(!res.ok || !res.body){ throw new Error('HTTP_' + res.status); }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var doneFiles = [];
    var hadError = null;

    function pump(){
      return reader.read().then(function(r){
        if(r.done) return;
        buffer += decoder.decode(r.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(function(line){
          if(!line.trim()) return;
          var evt;
          try{ evt = JSON.parse(line); }catch(e){ return; }
          if(evt.type === 'session'){
            conv.sessionId = evt.sessionId;
            saveConversations();
          } else if(evt.type === 'delta'){
            if(!streamedText){ pendingDiv.classList.remove('pending'); }
            streamedText += evt.text;
            statusEl.textContent = streamedText;
            log.scrollTop = log.scrollHeight;
          } else if(evt.type === 'status'){
            if(!streamedText){
              statusEl.textContent = evt.text;
              log.scrollTop = log.scrollHeight;
            }
          } else if(evt.type === 'todos'){
            latestTodos = evt.items || [];
            renderTodoList(todoBox, latestTodos);
            log.scrollTop = log.scrollHeight;
          } else if(evt.type === 'done'){
            doneFiles = evt.files || [];
          } else if(evt.type === 'error'){
            hadError = evt.error;
          }
        });
        return pump();
      });
    }

    return pump().then(function(){
      clearTimeout(timer);
      pendingDiv.remove();
      if(hadError && !streamedText){
        addMsg({ who: 'Error', text: hadError, cls: 'error', retryMessage: fullMessage });
      } else {
        addMsg({ who: 'JohanGPT', text: streamedText || '(sin salida)', cls: 'agent', markdown: true, files: doneFiles, todos: latestTodos });
      }
    });
  }).catch(function(err){
    clearTimeout(timer);
    pendingDiv.remove();
    if(err.message === 'CLAVE_INVALIDA'){
      addMsg({ who: 'Error', text: 'Clave de acceso inválida. Recarga la página para ingresarla de nuevo.', cls: 'error' });
      try{ localStorage.removeItem(KEY_STORAGE); }catch(e){}
    } else if(err.message === 'LIMITE_USO'){
      addMsg({ who: 'Error', text: 'Has hecho demasiadas peticiones seguidas. Espera un momento e intenta de nuevo.', cls: 'error', retryMessage: fullMessage });
    } else if(err.name === 'AbortError'){
      if(userStoppedFlag){
        if(streamedText){
          addMsg({ who: 'JohanGPT', text: streamedText + '\n\n_(detenido)_', cls: 'agent', markdown: true });
        } else {
          addMsg({ who: 'Error', text: 'Detenido antes de responder.', cls: 'error', retryMessage: fullMessage });
        }
      } else {
        addMsg({ who: 'Error', text: streamedText ? ('Se cortó la conexión, pero esto se alcanzó a recibir:\n\n' + streamedText) : 'Se agotó el tiempo de espera (casi 5 minutos). El agente puede seguir trabajando en el servidor.', cls: 'error', retryMessage: streamedText ? undefined : fullMessage });
      }
    } else {
      addMsg({ who: 'Error', text: 'No se pudo conectar con el agente: ' + err.message, cls: 'error', retryMessage: fullMessage });
    }
  }).finally(function(){
    isGenerating = false;
    activeController = null;
    updateGeneratingUI();
    sendBtn.disabled = false;
    input.focus();
  });
}

sendBtn.addEventListener('click', send);
stopBtn.addEventListener('click', function(){
  if(activeController){ userStoppedFlag = true; activeController.abort(); }
});

if(getKey()){
  openChat();
}

})();
</script>
