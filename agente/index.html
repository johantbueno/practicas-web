<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JohanGPT</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
:root{
  --bg:#0b0d12; --panel:#12151c; --border:#242938; --text:#d5dae3; --muted:#6b7386;
  --accent:#5fb98a; --user:#3b82f6; --err:#ef4444;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',ui-monospace,Consolas,monospace; height:100vh; display:flex; flex-direction:column;}
header{padding:.9rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.6rem; flex-shrink:0;}
header h1{font-size:.95rem; margin:0; font-weight:700; color:var(--accent);}
header .dot{width:8px; height:8px; border-radius:50%; background:var(--accent);}
#log{flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:1rem;}
.msg{max-width:min(760px,90%); white-space:pre-wrap; word-wrap:break-word; line-height:1.55; font-size:.88rem;}
.msg .who{font-size:.72rem; font-weight:700; margin-bottom:.3rem; letter-spacing:.04em; text-transform:uppercase;}
.msg.user{align-self:flex-end;}
.msg.user .who{color:var(--user); text-align:right;}
.msg.user .body{background:#132036; border:1px solid #24365a; border-radius:10px 10px 2px 10px; padding:.7rem .9rem;}
.msg.agent .who{color:var(--accent);}
.msg.agent .body{background:var(--panel); border:1px solid var(--border); border-radius:10px 10px 10px 2px; padding:.7rem .9rem;}
.msg.error .body{background:#2a1212; border:1px solid var(--err); color:#fca5a5; border-radius:10px;}
.msg.pending .body{color:var(--muted); font-style:italic;}
.msg.agent .body p{margin:.4em 0;}
.msg.agent .body p:first-child{margin-top:0;}
.msg.agent .body p:last-child{margin-bottom:0;}
.msg.agent .body code{background:#0f1830; border-radius:4px; padding:.1em .35em; font-size:.85em;}
.msg.agent .body pre{background:#0f1830; border:1px solid var(--border); border-radius:8px; padding:.7rem .8rem; overflow-x:auto;}
.msg.agent .body pre code{background:none; padding:0;}
.msg.agent .body ul, .msg.agent .body ol{margin:.4em 0; padding-left:1.4em;}
.msg.agent .body a{color:var(--user);}
.files-box{margin-top:.6rem; display:flex; flex-wrap:wrap; gap:.5rem;}
.files-box a{display:inline-flex; align-items:center; gap:.4rem; background:#0f1830; border:1px solid var(--border); border-radius:8px; padding:.4rem .7rem; font-size:.78rem; color:var(--accent); text-decoration:none;}
.files-box a:hover{border-color:var(--accent);}
#attachments{padding:0 1.25rem; display:flex; flex-wrap:wrap; gap:.5rem;}
#attachments:empty{display:none;}
.attach-chip{display:flex; align-items:center; gap:.4rem; background:var(--panel); border:1px solid var(--border); border-radius:999px; padding:.3rem .5rem .3rem .8rem; font-size:.76rem; color:var(--muted);}
.attach-chip.uploading{color:var(--accent);}
.attach-chip button{background:none; border:none; color:var(--muted); cursor:pointer; font-size:.9rem; line-height:1; padding:.1rem .3rem;}
#composer{border-top:1px solid var(--border); padding:.9rem 1.25rem; display:flex; gap:.6rem; flex-shrink:0; align-items:flex-end;}
#composer textarea{flex:1; resize:none; min-height:2.6rem; max-height:9rem; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.6rem .8rem; font-family:inherit; font-size:.9rem;}
#composer textarea:focus{outline:none; border-color:var(--accent);}
#composer button{background:var(--accent); color:#04170d; border:none; border-radius:8px; padding:0 1.3rem; font-weight:700; cursor:pointer; font-family:inherit; font-size:.85rem;}
#composer button:disabled{opacity:.5; cursor:wait;}
#attach-btn{background:var(--panel); border:1px solid var(--border); color:var(--text); padding:0 .9rem; height:2.6rem; font-size:1.1rem;}
#gate{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:10;}
#gate.hidden{display:none;}
#gate .box{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:2rem; width:min(360px,90vw); text-align:center;}
#gate input{width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.6rem .8rem; font-family:inherit; margin:1rem 0; box-sizing:border-box;}
#gate button{width:100%; background:var(--accent); color:#04170d; border:none; border-radius:8px; padding:.65rem; font-weight:700; cursor:pointer; font-family:inherit;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div style="font-size:1.8rem; margin-bottom:.5rem;">🤖</div>
    <div style="font-weight:700; color:var(--accent); margin-bottom:.4rem;">JohanGPT</div>
    <div style="font-size:.8rem; color:var(--muted);">Clave de acceso</div>
    <input type="password" id="gate-key" placeholder="Clave" autocomplete="off">
    <button id="gate-btn" type="button">Entrar</button>
  </div>
</div>

<header>
  <span class="dot"></span>
  <h1>JohanGPT</h1>
</header>

<div id="log"></div>

<div id="attachments"></div>

<div id="composer">
  <button id="attach-btn" type="button" title="Adjuntar archivo o foto">📎</button>
  <input type="file" id="file-input" multiple hidden>
  <textarea id="input" placeholder="Escribe una instrucción para JohanGPT…" rows="1"></textarea>
  <button id="send" type="button">Enviar</button>
</div>

<script>
(function(){
"use strict";

var AGENT_URL = 'https://agente.plataforma.cfd/agent';
var UPLOAD_URL = 'https://agente.plataforma.cfd/upload';
var DOWNLOAD_URL = 'https://agente.plataforma.cfd/download';
var KEY_STORAGE = 'vps_agent_key';
var HISTORY_STORAGE = 'johangpt_history_v1';

var gate = document.getElementById('gate');
var gateKey = document.getElementById('gate-key');
var gateBtn = document.getElementById('gate-btn');
var log = document.getElementById('log');
var input = document.getElementById('input');
var sendBtn = document.getElementById('send');
var attachBtn = document.getElementById('attach-btn');
var fileInput = document.getElementById('file-input');
var attachmentsEl = document.getElementById('attachments');
var attachedFiles = []; // { name, path, uploading }

function getKey(){ try{ return localStorage.getItem(KEY_STORAGE) || ''; }catch(e){ return ''; } }
function setKey(k){ try{ localStorage.setItem(KEY_STORAGE, k); }catch(e){} }

var historyRestored = false;
function openChat(){
  gate.classList.add('hidden');
  if(!historyRestored){ restoreHistory(); historyRestored = true; }
  input.focus();
}

if(getKey()){
  openChat();
}

gateBtn.addEventListener('click', function(){
  var k = gateKey.value.trim();
  if(!k) return;
  setKey(k);
  openChat();
});
gateKey.addEventListener('keydown', function(e){ if(e.key === 'Enter') gateBtn.click(); });

var history = [];
try{ history = JSON.parse(localStorage.getItem(HISTORY_STORAGE) || '[]'); }catch(e){ history = []; }

function saveHistory(){
  try{ localStorage.setItem(HISTORY_STORAGE, JSON.stringify(history.slice(-200))); }catch(e){}
}

function renderFilesBox(container, files){
  if(!files || !files.length) return;
  var box = document.createElement('div');
  box.className = 'files-box';
  files.forEach(function(f){
    var a = document.createElement('a');
    a.href = DOWNLOAD_URL + '?key=' + encodeURIComponent(getKey()) + '&file=' + encodeURIComponent(f.name);
    a.textContent = '⬇️ ' + f.name;
    a.target = '_blank';
    box.appendChild(a);
  });
  container.appendChild(box);
}

// entry: { who, text, cls, markdown, files }. persist=false para mensajes temporales (ej. "Pensando…")
function addMsg(entry, persist){
  var div = document.createElement('div');
  div.className = 'msg ' + entry.cls;
  var label = document.createElement('div');
  label.className = 'who';
  label.textContent = entry.who;
  var body = document.createElement('div');
  body.className = 'body';
  if(entry.markdown && window.marked){
    body.innerHTML = marked.parse(entry.text || '');
  } else {
    body.textContent = entry.text;
  }
  div.appendChild(label);
  div.appendChild(body);
  renderFilesBox(body, entry.files);
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  div._body = body;
  if(persist !== false){
    history.push(entry);
    saveHistory();
  }
  return div;
}

function restoreHistory(){
  history.forEach(function(entry){ addMsg(entry, false); });
}

function autoGrow(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 144) + 'px';
}
input.addEventListener('input', autoGrow);
input.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendBtn.click(); }
});

function renderAttachments(){
  attachmentsEl.innerHTML = '';
  attachedFiles.forEach(function(f, i){
    var chip = document.createElement('div');
    chip.className = 'attach-chip' + (f.uploading ? ' uploading' : '');
    var label = document.createElement('span');
    label.textContent = (f.uploading ? '⏳ ' : '📄 ') + f.name;
    var rm = document.createElement('button');
    rm.type = 'button';
    rm.textContent = '✕';
    rm.title = 'Quitar';
    rm.addEventListener('click', function(){ attachedFiles.splice(i, 1); renderAttachments(); });
    chip.appendChild(label);
    chip.appendChild(rm);
    attachmentsEl.appendChild(chip);
  });
}

function uploadFile(file){
  var entry = { name: file.name, path: null, uploading: true };
  attachedFiles.push(entry);
  renderAttachments();
  var key = getKey();
  fetch(UPLOAD_URL, {
    method: 'POST',
    headers: { 'X-Agent-Key': key, 'X-File-Name': file.name, 'Content-Type': 'application/octet-stream' },
    body: file
  }).then(function(res){ return res.json(); })
    .then(function(data){
      entry.uploading = false;
      if(data.ok){ entry.path = data.path; }
      else { entry.name += ' (error al subir)'; }
      renderAttachments();
    }).catch(function(){
      entry.uploading = false;
      entry.name += ' (error al subir)';
      renderAttachments();
    });
}

attachBtn.addEventListener('click', function(){
  if(!getKey()){ gate.classList.remove('hidden'); return; }
  fileInput.click();
});
fileInput.addEventListener('change', function(){
  Array.prototype.forEach.call(fileInput.files, uploadFile);
  fileInput.value = '';
});

function send(){
  var message = input.value.trim();
  var pendingUploads = attachedFiles.some(function(f){ return f.uploading; });
  if(!message && attachedFiles.length === 0) return;
  if(pendingUploads){ alert('Espera a que terminen de subirse los archivos adjuntos.'); return; }
  var key = getKey();
  if(!key){ gate.classList.remove('hidden'); return; }

  var readyFiles = attachedFiles.filter(function(f){ return f.path; });
  var fullMessage = message;
  if(readyFiles.length){
    var fileList = readyFiles.map(function(f){ return '- ' + f.path + ' (nombre original: ' + f.name + ')'; }).join('\n');
    fullMessage = 'Archivos adjuntos disponibles en el servidor:\n' + fileList + '\n\n' + (message || 'Revisa el/los archivo(s) adjunto(s) y cuéntame qué contienen.');
  }

  addMsg({ who: 'Tú', text: message || '(archivo adjunto sin mensaje)', cls: 'user' });
  input.value = '';
  attachedFiles = [];
  renderAttachments();
  autoGrow();
  sendBtn.disabled = true;

  var pendingDiv = addMsg({ who: 'JohanGPT', text: 'Pensando…', cls: 'agent pending' }, false);
  var streamedText = '';

  var controller = new AbortController();
  var timer = setTimeout(function(){ controller.abort(); }, 290000);

  fetch(AGENT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Agent-Key': key },
    body: JSON.stringify({ message: fullMessage }),
    signal: controller.signal
  }).then(function(res){
    if(res.status === 401){ throw new Error('CLAVE_INVALIDA'); }
    if(res.status === 429){ throw new Error('LIMITE_USO'); }
    if(!res.ok || !res.body){ throw new Error('HTTP_' + res.status); }

    pendingDiv.classList.remove('pending');
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var doneFiles = [];
    var hadError = null;

    function pump(){
      return reader.read().then(function(r){
        if(r.done) return;
        buffer += decoder.decode(r.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(function(line){
          if(!line.trim()) return;
          var evt;
          try{ evt = JSON.parse(line); }catch(e){ return; }
          if(evt.type === 'delta'){
            streamedText += evt.text;
            pendingDiv._body.textContent = streamedText;
            log.scrollTop = log.scrollHeight;
          } else if(evt.type === 'done'){
            doneFiles = evt.files || [];
          } else if(evt.type === 'error'){
            hadError = evt.error;
          }
        });
        return pump();
      });
    }

    return pump().then(function(){
      clearTimeout(timer);
      pendingDiv.remove();
      if(hadError && !streamedText){
        addMsg({ who: 'Error', text: hadError, cls: 'error' });
      } else {
        addMsg({ who: 'JohanGPT', text: streamedText || '(sin salida)', cls: 'agent', markdown: true, files: doneFiles });
      }
    });
  }).catch(function(err){
    clearTimeout(timer);
    pendingDiv.remove();
    if(err.message === 'CLAVE_INVALIDA'){
      addMsg({ who: 'Error', text: 'Clave de acceso inválida. Recarga la página para ingresarla de nuevo.', cls: 'error' });
      try{ localStorage.removeItem(KEY_STORAGE); }catch(e){}
    } else if(err.message === 'LIMITE_USO'){
      addMsg({ who: 'Error', text: 'Has hecho demasiadas peticiones seguidas. Espera un momento e intenta de nuevo.', cls: 'error' });
    } else if(err.name === 'AbortError'){
      addMsg({ who: 'Error', text: streamedText ? ('Se cortó la conexión, pero esto se alcanzó a recibir:\n\n' + streamedText) : 'Se agotó el tiempo de espera (casi 5 minutos). El agente puede seguir trabajando en el servidor.', cls: 'error' });
    } else {
      addMsg({ who: 'Error', text: 'No se pudo conectar con el agente: ' + err.message, cls: 'error' });
    }
  }).finally(function(){
    sendBtn.disabled = false;
    input.focus();
  });
}
sendBtn.addEventListener('click', send);

})();
</script>
</body>
</html>
